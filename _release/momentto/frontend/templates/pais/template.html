<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momentto | Dia dos Pais</title>
    <style>
      :root {
        --bg: #fafaf7;
        --surface: rgba(246, 250, 255, 0.88);
        --text: #2c2c2a;
        --muted: #5b6674;
        --gold: #c9a84c;
        --accent: #243b5c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(36, 59, 92, 0.16), transparent 30%),
          radial-gradient(circle at bottom right, rgba(201, 168, 76, 0.16), transparent 28%),
          linear-gradient(180deg, #fffefb 0%, var(--bg) 100%);
        color: var(--text);
        font-family: Georgia, serif;
      }
      main {
        width: min(960px, calc(100vw - 28px));
        margin: 0 auto;
        padding: 30px 0 64px;
      }
      section {
        margin-bottom: 18px;
        border-radius: 30px;
        padding: 28px;
        background: var(--surface);
        border: 1px solid rgba(36, 59, 92, 0.14);
        box-shadow: 0 22px 50px rgba(36, 47, 63, 0.12);
      }
      .hero {
        padding: 54px 28px;
        background: linear-gradient(145deg, rgba(255,255,255,0.94), rgba(234, 240, 248, 0.96));
      }
      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 12px;
        color: var(--gold);
      }
      h1 {
        margin: 10px 0 12px;
        font-size: clamp(42px, 7vw, 76px);
        font-weight: 500;
        color: var(--accent);
      }
      .date {
        color: var(--muted);
        font-size: 20px;
      }
      h2 {
        margin-top: 0;
        font-size: 28px;
      }
      .message {
        font-size: 20px;
        line-height: 1.8;
        color: var(--muted);
      }
      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 14px;
      }
      .gallery-card {
        margin: 0;
      }
      .gallery-card img {
        width: 100%;
        height: 220px;
        object-fit: cover;
        border-radius: 22px;
        border: 1px solid rgba(36, 59, 92, 0.2);
      }
      .signature {
        text-align: right;
        font-size: 30px;
        color: var(--gold);
      }
      .gallery-empty {
        color: var(--muted);
      }
      @media (max-width: 640px) {
        section { padding: 22px; }
        .hero { padding: 44px 22px; }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <div class="eyebrow">Homenagem especial</div>
        <h1>{{recipientName}}</h1>
        <div class="date">{{date}}</div>
      </section>

      <section>
        <h2>Mensagem</h2>
        <div class="message">{{message}}</div>
      </section>

      <section>
        <h2>Galeria de lembranças</h2>
        <div class="gallery-grid">{{photos}}</div>
      </section>

      <section>
        <h2>Assinatura</h2>
        <div class="signature">{{senderName}}</div>
      </section>
    </main>
  </body>
</html>
