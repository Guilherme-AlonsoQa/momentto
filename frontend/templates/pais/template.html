<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momentto — {{recipientName}}</title>
    <meta property="og:title" content="Momentto para {{recipientName}}">
    <meta property="og:description" content="Uma homenagem especial criada com carinho.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #f5f8fc;
        --surface: rgba(248, 251, 255, 0.92);
        --text: #1a2535;
        --muted: #5a6a7e;
        --gold: #c9a84c;
        --gold-soft: rgba(201, 168, 76, 0.12);
        --navy: #1f3555;
        --navy-soft: rgba(31, 53, 85, 0.08);
        --border: rgba(31, 53, 85, 0.14);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }

      body {
        background:
          radial-gradient(ellipse at 5% 0%, rgba(31, 53, 85, 0.12), transparent 35%),
          radial-gradient(ellipse at 95% 100%, rgba(201, 168, 76, 0.1), transparent 38%),
          linear-gradient(180deg, #f0f5ff 0%, #eef3fb 40%, #e8f0f8 100%);
        color: var(--text);
        font-family: "Manrope", sans-serif;
        min-height: 100vh;
      }

      main {
        width: min(900px, calc(100vw - 24px));
        margin: 0 auto;
        padding: 40px 0 80px;
        display: grid;
        gap: 16px;
      }

      section {
        border-radius: 28px;
        padding: 36px;
        background: var(--surface);
        border: 1px solid var(--border);
        box-shadow: 0 20px 60px rgba(20, 40, 80, 0.1);
      }

      /* HERO */
      .hero {
        padding: 72px 40px 60px;
        position: relative;
        overflow: hidden;
        background:
          radial-gradient(circle at 15% 20%, rgba(31, 53, 85, 0.1), transparent 40%),
          radial-gradient(circle at 85% 80%, rgba(201, 168, 76, 0.1), transparent 40%),
          var(--surface);
      }

      .hero-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 18px;
        border-radius: 999px;
        background: var(--navy-soft);
        border: 1px solid rgba(31, 53, 85, 0.18);
        margin-bottom: 28px;
      }

      .hero-badge span {
        text-transform: uppercase;
        letter-spacing: 0.22em;
        font-size: 11px;
        font-weight: 700;
        color: var(--navy);
      }

      h1 {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(48px, 9vw, 90px);
        font-weight: 600;
        line-height: 0.9;
        letter-spacing: -0.03em;
        color: var(--text);
        margin-bottom: 24px;
      }

      .hero-rule {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 20px;
        max-width: 280px;
      }

      .hero-rule::after {
        content: "";
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, var(--gold), transparent);
      }

      .hero-rule span {
        color: var(--gold);
        font-size: 16px;
        flex-shrink: 0;
      }

      .hero-date {
        font-family: "Cormorant Garamond", serif;
        font-style: italic;
        font-size: 21px;
        color: var(--muted);
      }

      /* MENSAGEM */
      .message-section {
        border-left: 3px solid var(--gold);
        padding-left: 36px;
      }

      .message-label {
        text-transform: uppercase;
        letter-spacing: 0.2em;
        font-size: 11px;
        font-weight: 700;
        color: var(--gold);
        margin-bottom: 14px;
        display: block;
      }

      .message-section h2 {
        font-family: "Cormorant Garamond", serif;
        font-size: 30px;
        font-weight: 500;
        margin-bottom: 18px;
        color: var(--navy);
      }

      .message-body {
        font-size: 17px;
        line-height: 1.9;
        color: var(--muted);
      }

      /* GALERIA */
      .gallery-section h2 {
        font-family: "Cormorant Garamond", serif;
        font-size: 28px;
        font-weight: 500;
        margin-bottom: 24px;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .gallery-section h2::after {
        content: "";
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, var(--border), transparent);
      }

      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 14px;
      }

      .gallery-card { margin: 0; }

      .gallery-card img {
        width: 100%;
        height: 240px;
        object-fit: cover;
        border-radius: 20px;
        border: 1px solid var(--border);
        display: block;
        transition: transform 300ms ease, box-shadow 300ms ease;
      }

      .gallery-card img:hover {
        transform: scale(1.03);
        box-shadow: 0 16px 40px rgba(20, 40, 80, 0.18);
      }

      .gallery-empty { color: var(--muted); font-style: italic; padding: 24px 0; }

      /* ASSINATURA */
      .signature-section {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        padding: 36px 40px;
        background: linear-gradient(135deg, var(--navy-soft), rgba(201, 168, 76, 0.06));
      }

      .signature-left span {
        display: block;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 11px;
        font-weight: 700;
        color: var(--muted);
        margin-bottom: 10px;
      }

      .signature-name {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(28px, 4.5vw, 50px);
        font-weight: 500;
        color: var(--navy);
        line-height: 1;
        letter-spacing: -0.01em;
      }

      .signature-right { text-align: right; }

      .signature-gold {
        font-family: "Cormorant Garamond", serif;
        font-size: 48px;
        color: var(--gold);
        line-height: 1;
        opacity: 0.65;
      }

      /* FOOTER */
      .page-footer {
        text-align: center;
        padding: 20px;
        border-radius: 18px;
        background: var(--gold-soft);
        border: 1px solid rgba(201, 168, 76, 0.16);
      }

      .page-footer p { font-size: 12px; color: var(--muted); letter-spacing: 0.08em; }
      .page-footer a { color: var(--gold); font-weight: 700; text-decoration: none; }

      @media (max-width: 600px) {
        section { padding: 24px 20px; }
        .hero { padding: 52px 24px 44px; }
        .message-section { padding-left: 22px; }
        .signature-section { flex-direction: column; text-align: center; padding: 26px 20px; }
        .signature-right { text-align: center; }
        .gallery-card img { height: 180px; }
        .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
      }
    </style>
  </head>
  <body>
    <main>

      <section class="hero">
        <div class="hero-badge">
          <span>Momentto · Dia dos Pais</span>
        </div>
        <h1>{{recipientName}}</h1>
        <div class="hero-rule"><span>✦</span></div>
        <div class="hero-date">{{date}}</div>
      </section>

      <section class="message-section">
        <span class="message-label">Mensagem especial</span>
        <h2>Para você, pai.</h2>
        <div class="message-body">{{message}}</div>
      </section>

      <section class="gallery-section">
        <h2>Nossas memórias</h2>
        {{photos}}
      </section>

      <section class="signature-section">
        <div class="signature-left">
          <span>Com orgulho e carinho</span>
          <div class="signature-name">{{senderName}}</div>
        </div>
        <div class="signature-right">
          <div class="signature-gold">♦</div>
        </div>
      </section>

      <div class="page-footer">
        <p>Criado com carinho em <a href="https://momentto.netlify.app" target="_blank">momentto.netlify.app</a> · Este link é permanente e não expira.</p>
      </div>

    </main>
  </body>
</html>
