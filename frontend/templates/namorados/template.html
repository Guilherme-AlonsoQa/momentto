<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momentto — {{recipientName}}</title>
    <meta property="og:title" content="Momentto para {{recipientName}}">
    <meta property="og:description" content="Uma página especial criada com amor.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #fdf9f6;
        --surface: rgba(255, 252, 249, 0.92);
        --text: #2a2420;
        --muted: #7a6a5e;
        --gold: #c9a84c;
        --gold-soft: rgba(201, 168, 76, 0.14);
        --accent: #d79bb1;
        --accent-soft: rgba(215, 155, 177, 0.15);
        --border: rgba(215, 155, 177, 0.22);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      html { scroll-behavior: smooth; }

      body {
        background:
          radial-gradient(ellipse at 10% 0%, rgba(215, 155, 177, 0.18), transparent 38%),
          radial-gradient(ellipse at 90% 100%, rgba(201, 168, 76, 0.14), transparent 36%),
          radial-gradient(ellipse at 50% 50%, rgba(255, 240, 245, 0.4), transparent 70%),
          linear-gradient(180deg, #fffbf9 0%, #fdf7f4 40%, #faf5f0 100%);
        color: var(--text);
        font-family: "Manrope", sans-serif;
        min-height: 100vh;
      }

      main {
        width: min(900px, calc(100vw - 24px));
        margin: 0 auto;
        padding: 40px 0 80px;
        display: grid;
        gap: 16px;
      }

      section {
        border-radius: 28px;
        padding: 36px;
        background: var(--surface);
        border: 1px solid var(--border);
        box-shadow: 0 20px 60px rgba(120, 80, 70, 0.1);
        backdrop-filter: blur(8px);
      }

      /* HERO */
      .hero {
        text-align: center;
        padding: 64px 40px 56px;
        position: relative;
        overflow: hidden;
      }

      .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 20% 30%, rgba(215, 155, 177, 0.22), transparent 40%),
          radial-gradient(circle at 80% 70%, rgba(201, 168, 76, 0.14), transparent 40%);
        pointer-events: none;
      }

      .hero-eyebrow {
        display: inline-block;
        text-transform: uppercase;
        letter-spacing: 0.24em;
        font-size: 11px;
        font-weight: 700;
        color: var(--gold);
        margin-bottom: 20px;
        position: relative;
      }

      .hero-eyebrow::before,
      .hero-eyebrow::after {
        content: "—";
        margin: 0 8px;
        opacity: 0.5;
      }

      h1 {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(52px, 10vw, 96px);
        font-weight: 500;
        line-height: 0.92;
        letter-spacing: -0.02em;
        color: var(--text);
        position: relative;
      }

      .hero-divider {
        width: 60px;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--accent), transparent);
        margin: 24px auto;
      }

      .hero-date {
        font-family: "Cormorant Garamond", serif;
        font-style: italic;
        font-size: 22px;
        color: var(--accent);
        position: relative;
      }

      /* MENSAGEM */
      .message-section h2 {
        font-family: "Cormorant Garamond", serif;
        font-size: 28px;
        font-weight: 500;
        margin-bottom: 20px;
        color: var(--text);
      }

      .message-ornament {
        width: 36px;
        height: 2px;
        background: linear-gradient(90deg, var(--accent), var(--gold));
        border-radius: 2px;
        margin-bottom: 16px;
      }

      .message-body {
        font-size: 18px;
        line-height: 1.9;
        color: var(--muted);
        font-style: italic;
        font-family: "Cormorant Garamond", serif;
      }

      /* GALERIA */
      .gallery-section h2 {
        font-family: "Cormorant Garamond", serif;
        font-size: 28px;
        font-weight: 500;
        margin-bottom: 24px;
        color: var(--text);
      }

      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 14px;
      }

      .gallery-card { margin: 0; }

      .gallery-card img {
        width: 100%;
        height: 240px;
        object-fit: cover;
        border-radius: 20px;
        border: 1px solid var(--border);
        display: block;
        transition: transform 300ms ease, box-shadow 300ms ease;
      }

      .gallery-card img:hover {
        transform: scale(1.03);
        box-shadow: 0 16px 40px rgba(120, 80, 70, 0.18);
      }

      .gallery-empty {
        color: var(--muted);
        font-style: italic;
        padding: 24px 0;
      }

      /* ASSINATURA */
      .signature-section {
        text-align: right;
        padding: 36px 40px;
      }

      .signature-label {
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 11px;
        font-weight: 700;
        color: var(--muted);
        margin-bottom: 12px;
        display: block;
      }

      .signature-name {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(32px, 5vw, 54px);
        font-weight: 500;
        font-style: italic;
        color: var(--gold);
        line-height: 1;
        letter-spacing: -0.01em;
      }

      /* FOOTER */
      .page-footer {
        text-align: center;
        padding: 24px;
        border-radius: 20px;
        background: var(--gold-soft);
        border: 1px solid rgba(201, 168, 76, 0.18);
      }

      .page-footer p {
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 0.1em;
      }

      .page-footer a {
        color: var(--gold);
        font-weight: 700;
        text-decoration: none;
      }

      @media (max-width: 600px) {
        section { padding: 26px 22px; }
        .hero { padding: 48px 24px 42px; }
        .signature-section { padding: 26px 22px; }
        .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
        .gallery-card img { height: 180px; }
      }
    </style>
  </head>
  <body>
    <main>

      <section class="hero">
        <div class="hero-eyebrow">Momentto especial</div>
        <h1>{{recipientName}}</h1>
        <div class="hero-divider"></div>
        <div class="hero-date">{{date}}</div>
      </section>

      <section class="message-section">
        <div class="message-ornament"></div>
        <h2>Mensagem especial</h2>
        <div class="message-body">{{message}}</div>
      </section>

      <section class="gallery-section">
        <h2>Nossas memórias</h2>
        {{photos}}
      </section>

      <section class="signature-section">
        <span class="signature-label">Com todo o meu amor</span>
        <div class="signature-name">{{senderName}}</div>
      </section>

      <div class="page-footer">
        <p>Criado com carinho em <a href="https://momentto.netlify.app" target="_blank">momentto.netlify.app</a> · Este link é permanente e não expira.</p>
      </div>

    </main>
  </body>
</html>
